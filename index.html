<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Recognition Model</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.4.0/css/font-awesome.min.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        * , *:before, *:after { box-sizing: border-box; }
        
        body {
            background: linear-gradient(180deg, #333333 0%, #000000 100%);
            font-family: 'Poppins', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            color: white;
            padding: 20px;
        }

        h2 { font-weight: 700; margin-bottom: 30px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }

        .uploadWrapper {
            position: relative;
            width: 500px;
            max-width: 100%;
        }

        .imageUploadForm {
            background: rgba(255, 255, 255, 0.05);
            height: 400px;
            width: 100%;
            position: relative;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            flex-wrap: wrap;
            border-radius: 20px;
            border: 2px solid rgba(255,255,255,0.1);
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .imageUploadForm .helpText {
            color: rgba(255,255,255,0.7); display: block; position: absolute;
            top: 2%; left: 0; width: 100%; height: 100%;
            text-align: center; font-size: 30px; font-weight: 300; z-index: 1;
        }

        .imageUploadForm.loaded .helpText { display: none; }

        .imageUploadForm .helpText:after {
            content: '\f0ee'; font-family: 'FontAwesome';
            font-size: 150%; color: rgba(255, 255, 255, 0.3);
            display: flex; align-items: center; justify-content: center;
            margin: 4% auto; width: 50%; height: 50%;
            border: 4px dashed rgba(255, 255, 255, 0.2);
            border-radius: 15px;
        }

        /* 업로드된 이미지 표시 영역 */
        #face-image {
            position: absolute; top: 10%; left: 10%;
            width: 80%; height: 70%;
            object-fit: contain; /* 이미지 비율 유지 */
            border-radius: 10px;
            display: none;
            z-index: 5;
        }

        .imageUploadForm.loaded #face-image { display: block; }

        .imageUploadForm .pickFile {
            position: absolute; bottom: 0; left: 0;
            display: flex; background: rgba(0,0,0,0.3);
            height: 25%; width: 100%;
            align-items: center; justify-content: center;
        }

        .pickFileButton {
            display: inline-block; padding: 12px 25px;
            font-weight: 500; font-size: 16px; color: white;
            background: #FF6B6B;
            border-radius: 20px; text-decoration: none;
            box-shadow: 0 4px 10px rgba(255,107,107,0.4);
        }

        .uploadButton {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; opacity: 0;
            cursor: pointer; z-index: 10;
        }

        #label-container { width: 500px; max-width: 100%; margin-top: 30px; }
        
        #label-container div {
            background: rgba(255,255,255,0.05); padding: 15px;
            margin-bottom: 10px; border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            font-size: 18px; display: flex; justify-content: space-between;
        }
    </style>
</head>
<body>

    <h2>동물상 판독기</h2>

    <div class="uploadWrapper">
      <form id="imageUploadForm" class="imageUploadForm">
        <span class="helpText">여기다가 파일 업로드</span>
        <input type='file' id="file" class="uploadButton" accept="image/*" />
        
        <img id="face-image" src="" alt="uploaded image" />
        
        <span class="pickFile">
          <a href="#" class="pickFileButton">
            <i class="fa fa-image"></i> Go Go
          </a>
        </span>
      </form>
    </div>

    <div id="label-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

    <script>
        const URL = "https://teachablemachine.withgoogle.com/models/kZ-a4VTne/";
        let model, labelContainer, maxPredictions;

        // 1. 페이지 로드 시 모델을 미리 불러옵니다.
        async function loadModel() {
            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";
            model = await tmImage.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();
            
            labelContainer = document.getElementById("label-container");
            labelContainer.innerHTML = ""; // 초기화
            for (let i = 0; i < maxPredictions; i++) {
                labelContainer.appendChild(document.createElement("div"));
            }
            console.log("Model Ready.");
        }

        // 2. 이미지를 예측하는 함수
        async function predict() {
            const image = document.getElementById("face-image");
            const prediction = await model.predict(image);
            
            for (let i = 0; i < maxPredictions; i++) {
                const classPrediction = 
                    "<span>" + prediction[i].className + "</span>" + 
                    "<span style='font-weight: 700; color: #FF6B6B;'>" + (prediction[i].probability * 100).toFixed(0) + "%</span>";
                labelContainer.childNodes[i].innerHTML = classPrediction;
            }
        }

        // 3. 파일 업로드 및 분석 트리거
        $(document).ready(function() {
            loadModel();

            const $form = $("#imageUploadForm");
            const $file = $("#file");
            const $faceImage = $("#face-image");

            $file.on('change', function() {
                if (this.files && this.files[0]) {
                    const reader = new FileReader();
                    
                    reader.onload = function (e) {
                        $faceImage.attr('src', e.target.result);
                        $form.addClass('loaded');
                        
                        // 이미지가 화면에 완전히 로드된 후 AI 분석 시작
                        $faceImage.on('load', function() {
                            if (model) predict();
                        });
                    };
                    reader.readAsDataURL(this.files[0]);
                }
            });
        });
    </script>
</body>
</html>
